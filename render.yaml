services:
  - type: web
    name: codesheriff
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SHADOW_MODE
        value: "false"
