services:
  webhook:
    build: .
    command: uvicorn webhook_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ANALYSIS_SERVICE_URL=http://analysis:8002
      - DATABASE_URL=sqlite:////data/codesheriff.db
    volumes:
      - db_data:/data

  analysis:
    build: .
    command: uvicorn analysis_service.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - COMMENT_SERVICE_URL=http://comment:8003
      - DATABASE_URL=sqlite:////data/codesheriff.db
    volumes:
      - db_data:/data

  comment:
    build: .
    command: uvicorn comment_service.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/codesheriff.db
    volumes:
      - db_data:/data

  dashboard:
    build: .
    command: python dashboard/app.py
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - ANALYSIS_SERVICE_URL=http://analysis:8002
      - DATABASE_URL=sqlite:////data/codesheriff.db
    volumes:
      - db_data:/data

volumes:
  db_data:
